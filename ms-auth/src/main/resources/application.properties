spring.application.name=ms-auth
server.port=8082

# Conexión flexible a la Base de Datos (usa localhost en tu IDE o el host de Docker si se define)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ms-user}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}

# Configuración de JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Habilitar Flyway para migraciones de usuarios
spring.flyway.enabled=true

# Clave secreta compartida para generar y validar JWT
jwt.secret=${JWT_SECRET:clave_super_secreta_12345678901234567890}

# Registro flexible en Eureka (Usa ms-eureka dentro de Docker o localhost en tu IDE)
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true