    change-log: classpath:/db/changelog/laboratorio.sql
server:
  port: 8092
jwt:
  secret: clave_super_secreta_12345678901234567890
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true
