spring:
  application:
    name: ms-veterinario
  datasource:
    url: "jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ms-veterinario}"
    username: "${DB_USER:root}"
    password: "${DB_PASSWORD:}"
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true

server:
  port: 8088

jwt:
  secret: "${JWT_SECRET:clave_super_secreta_12345678901234567890}"

eureka:
  client:
    service-url:
      defaultZone: "http://localhost:8761/eureka"
  instance:
    prefer-ip-address: true