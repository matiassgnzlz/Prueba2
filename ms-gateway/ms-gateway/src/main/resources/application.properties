spring.application.name=ms-gateway
server.port=8079

# ==========================================
# CONFIGURACION DE ENRUTAMIENTO DINAMICO (REACTIVO)
# ==========================================

# 0. Ruta para el Microservicio de Autenticacion
spring.cloud.gateway.routes[0].id=ms-auth
spring.cloud.gateway.routes[0].uri=lb://ms-auth
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

# 1. Ruta para el Microservicio de Dueno
spring.cloud.gateway.routes[1].id=ms-dueno
spring.cloud.gateway.routes[1].uri=lb://ms-dueno
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/dueno/**

# 2. Ruta para el Microservicio de Mascota
spring.cloud.gateway.routes[2].id=ms-mascota
spring.cloud.gateway.routes[2].uri=lb://ms-mascota
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/mascota/**

# 3. Ruta para el Microservicio de Veterinario
spring.cloud.gateway.routes[3].id=ms-veterinario
spring.cloud.gateway.routes[3].uri=lb://ms-veterinario
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/veterinario/**

# 4. Ruta para el Microservicio de Citas
spring.cloud.gateway.routes[4].id=ms-citas
spring.cloud.gateway.routes[4].uri=lb://ms-citas
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/citas/**

# 5. Ruta para el Microservicio de Historia Clinica
spring.cloud.gateway.routes[5].id=ms-historiaclinica
spring.cloud.gateway.routes[5].uri=lb://ms-historiaclinica
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/historiaclinica/**

# 6. Ruta para el Microservicio de Vacunacion
# OJO: spring.application.name de ese microservicio es "vacunacion" (sin tilde, sin ms-)
spring.cloud.gateway.routes[6].id=ms-vacunacion
spring.cloud.gateway.routes[6].uri=lb://vacunacion
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/vacunacion/**

# 7. Ruta para el Microservicio de Facturacion
# OJO: spring.application.name de ese microservicio es "facturacion" (sin ms-)
spring.cloud.gateway.routes[7].id=ms-facturacion
spring.cloud.gateway.routes[7].uri=lb://facturacion
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/v1/facturacion/**

# 8. Ruta para el Microservicio de Farmacia
spring.cloud.gateway.routes[8].id=vet-farmacia
spring.cloud.gateway.routes[8].uri=lb://vet-farmacia
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/v1/farmacia/**

# 9. Ruta para el Microservicio de Laboratorio
spring.cloud.gateway.routes[9].id=vet-laboratorio
spring.cloud.gateway.routes[9].uri=lb://vet-laboratorio
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/v1/laboratorio/**

# 10. Ruta para el Microservicio de Receta
spring.cloud.gateway.routes[10].id=vet-receta
spring.cloud.gateway.routes[10].uri=lb://vet-receta
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/v1/receta/**

# ==========================================
# CONEXION AL SERVIDOR DE DESCUBRIMIENTO EUREKA
# ==========================================
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Activa la integracion del localizador de servicios con el LoadBalancer
# (permite ademas llamar a /MS-AUTH/** usando el nombre tal cual esta en Eureka,
#  como respaldo de las rutas manuales de arriba)
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ==========================================
# LOGS (opcional, util para depurar el enrutamiento mientras desarrollas)
# ==========================================
logging.level.org.springframework.cloud.gateway=INFO
logging.level.com.netflix.eureka=WARN
logging.level.com.netflix.discovery=WARN
