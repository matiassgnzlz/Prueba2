spring:
  application:
    name: vet-receta
  datasource:
    url: jdbc:mysql://localhost:3306/db_receta
    username: root
    password: ""
  jpa:
    hibernate:
      ddl-auto: none
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/receta.sql

server:
  port: 8091

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true