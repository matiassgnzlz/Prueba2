server:
  port: 8083

spring:
  application:
    name: ms-dueno
  
  # Configuración de Base de Datos compatible con Docker y Local
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ms-dueno}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
  
  # Formateo y Visualización de SQL en Consola
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  # Migraciones y Seguridad (Configuración nativa de tu guía)
  flyway:
    enabled: true

jwt:
  secret: ${JWT_SECRET:clave_super_secreta_12345678901234567890}

# Conexión al servidor de descubrimiento Eureka
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true